<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo poll</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --text-light: #f5f5f5;
            --text-muted: #888888;
            --border-dark: #222222;
            --orange-ui: #d66d18;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            -webkit-font-smoothing: antialiased;
        }

        .app-container { 
            width: 100%; 
            min-height: 100vh; 
            max-width: 1800px; 
            margin: 0 auto; 
            padding: 40px 50px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }

        header h1 { font-size: 24px; font-weight: 400; text-transform: uppercase; letter-spacing: 0.15em; margin: 0 0 8px 0; color: var(--text-light); }
        header .subtitle { font-size: 16px; color: var(--text-muted); margin: 0; }

        .gallery-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 40px 0; }
        .gallery-row { display: none; width: 100%; flex-direction: column; gap: 30px; }
        .gallery-row.active { display: flex; animation: fadeInGallery 0.5s cubic-bezier(0.25, 0.7, 0.5, 1) forwards; }

        .images-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 40px; width: 100%; align-items: flex-start; }

        @keyframes fadeInGallery {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-item { display: flex; flex-direction: column; position: relative; }
        
        .image-wrapper { width: 100%; overflow: hidden; cursor: zoom-in; background-color: #111; border: 2px solid var(--border-dark); transition: all 0.3s ease; }
        .image-wrapper img { width: 100%; height: auto; display: block; filter: brightness(1); transition: all 0.4s ease; }
        .image-wrapper:hover img { filter: brightness(1); transform: scale(1.01); }
        
        .image-item.selected .image-wrapper { border-color: var(--orange-ui); }
        .image-item.selected .image-wrapper img { filter: brightness(1.05); }

        .image-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; margin-bottom: 12px; }
        .image-caption { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
        
        .select-btn {
            background: transparent; border: 2px solid var(--border-dark); color: var(--text-muted);
            padding: 10px; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s ease; width: 100%; text-align: center;
        }
        .select-btn:hover { border-color: var(--text-light); color: var(--text-light); }
        .image-item.selected .select-btn { background: var(--orange-ui); border-color: var(--orange-ui); color: var(--bg-dark); font-weight: 600; }

        .comment-box {
            width: 100%; display: flex; flex-direction: column; margin-top: 10px;
            opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.4s ease;
        }
        .comment-box.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .comment-box label { font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .comment-box textarea {
            background: transparent; border: none; border-bottom: 1px solid var(--border-dark);
            color: var(--text-light); font-size: 14px; font-family: inherit; padding: 10px 0;
            outline: none; resize: none; height: 40px; transition: border-color 0.3s;
        }
        .comment-box textarea:focus { border-bottom: 1px solid var(--text-light); }

        /* FOOTER */
        .nav-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-dark); padding-top: 25px; margin-top: 20px; }
        .set-info { display: flex; align-items: baseline; }
        .set-index { font-size: 32px; font-weight: 300; line-height: 1; letter-spacing: -0.05em; color: var(--text-light); }
        .set-name { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-left: 15px; }
        
        .center-actions { display: flex; gap: 40px; align-items: center; margin-left: 60px; }
        
        .arrow-btn { background: none; border: none; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); cursor: pointer; padding: 5px 0; border-bottom: 1px solid transparent; transition: all 0.3s ease; }
        .arrow-btn:hover { border-bottom: 1px solid var(--text-light); }
        .arrow-btn:disabled { color: var(--text-muted); cursor: not-allowed; border-bottom: 1px solid transparent; }

        .submit-btn {
            background: transparent; color: var(--text-light); border: 2px solid var(--text-light);
            padding: 12px 30px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; display: none;
        }
        .submit-btn:hover { background: var(--text-light); color: var(--bg-dark); }

        /* LIGHTBOX */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(10, 10, 10, 0.98); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; cursor: zoom-out; }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox img { max-width: 92%; max-height: 90vh; object-fit: contain; }

        @media (max-width: 768px) {
            .app-container { padding: 30px 20px; }
            .images-grid { grid-template-columns: 100%; gap: 30px; }
            .nav-footer { flex-direction: column; gap: 25px; margin-top: 40px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header>
        <h1>Photo Poll 001</h1>
        <p class="subtitle">Click on any image to expand. Use the button below each photo to cast your vote.</p>
    </header>

    <section class="gallery-container">
        
        <div class="gallery-row active" data-id="01" data-name="Set 01">
            <div class="images-grid">
                <div class="image-item" data-option="Option A" id="item-01-A">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set1_fotoA.jpg" alt="A"></div>
                    <div class="image-meta"><span class="image-caption">// Option A</span></div>
                    <button class="select-btn" onclick="selectImage('item-01-A', '01', 'Option A')">Select</button>
                </div>
                <div class="image-item" data-option="Option B" id="item-01-B">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set1_fotoB.jpg" alt="B"></div>
                    <div class="image-meta"><span class="image-caption">// Option B</span></div>
                    <button class="select-btn" onclick="selectImage('item-01-B', '01', 'Option B')">Select</button>
                </div>
                <div class="image-item" data-option="Option C" id="item-01-C">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set1_fotoC.jpg" alt="C"></div>
                    <div class="image-meta"><span class="image-caption">// Option C</span></div>
                    <button class="select-btn" onclick="selectImage('item-01-C', '01', 'Option C')">Select</button>
                </div>
                <div class="image-item" data-option="Option D" id="item-01-D">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set1_fotoD.jpg" alt="D"></div>
                    <div class="image-meta"><span class="image-caption">// Option D</span></div>
                    <button class="select-btn" onclick="selectImage('item-01-D', '01', 'Option D')">Select</button>
                </div>
            </div>
            <div class="comment-box" id="comment-box-01">
                <label>// Why did you choose this photo from Set 01?</label>
                <textarea id="critica-set1" placeholder="Write your reasoning here..." required></textarea>
            </div>
        </div>

        <div class="gallery-row" data-id="02" data-name="Set 02">
            <div class="images-grid">
                <div class="image-item" data-option="Option A" id="item-02-A">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set2_fotoA.jpg" alt="A"></div>
                    <div class="image-meta"><span class="image-caption">// Option A</span></div>
                    <button class="select-btn" onclick="selectImage('item-02-A', '02', 'Option A')">Select</button>
                </div>
                <div class="image-item" data-option="Option B" id="item-02-B">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set2_fotoB.jpg" alt="B"></div>
                    <div class="image-meta"><span class="image-caption">// Option B</span></div>
                    <button class="select-btn" onclick="selectImage('item-02-B', '02', 'Option B')">Select</button>
                </div>
                <div class="image-item" data-option="Option C" id="item-02-C">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set2_fotoC.jpg" alt="C"></div>
                    <div class="image-meta"><span class="image-caption">// Option C</span></div>
                    <button class="select-btn" onclick="selectImage('item-02-C', '02', 'Option C')">Select</button>
                </div>
                <div class="image-item" data-option="Option D" id="item-02-D">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set2_fotoD.jpg" alt="D"></div>
                    <div class="image-meta"><span class="image-caption">// Option D</span></div>
                    <button class="select-btn" onclick="selectImage('item-02-D', '02', 'Option D')">Select</button>
                </div>
            </div>
            <div class="comment-box" id="comment-box-02">
                <label>// Why did you choose this photo from Set 02?</label>
                <textarea id="critica-set2" placeholder="Write your reasoning here..." required></textarea>
            </div>
        </div>

        <div class="gallery-row" data-id="03" data-name="Set 03">
            <div class="images-grid">
                <div class="image-item" data-option="Option A" id="item-03-A">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set3_fotoA.jpg" alt="A"></div>
                    <div class="image-meta"><span class="image-caption">// Option A</span></div>
                    <button class="select-btn" onclick="selectImage('item-03-A', '03', 'Option A')">Select</button>
                </div>
                <div class="image-item" data-option="Option B" id="item-03-B">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set3_fotoB.jpg" alt="B"></div>
                    <div class="image-meta"><span class="image-caption">// Option B</span></div>
                    <button class="select-btn" onclick="selectImage('item-03-B', '03', 'Option B')">Select</button>
                </div>
                <div class="image-item" data-option="Option C" id="item-03-C">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set3_fotoC.jpg" alt="C"></div>
                    <div class="image-meta"><span class="image-caption">// Option C</span></div>
                    <button class="select-btn" onclick="selectImage('item-03-C', '03', 'Option C')">Select</button>
                </div>
                <div class="image-item" data-option="Option D" id="item-03-D">
                    <div class="image-wrapper" onclick="openLightbox(this)"><img src="set3_fotoD.jpg" alt="D"></div>
                    <div class="image-meta"><span class="image-caption">// Option D</span></div>
                    <button class="select-btn" onclick="selectImage('item-03-D', '03', 'Option D')">Select</button>
                </div>
            </div>
            <div class="comment-box" id="comment-box-03">
                <label>// Why did you choose this photo from Set 03?</label>
                <textarea id="critica-set3" placeholder="Write your reasoning here..." required></textarea>
            </div>
        </div>

    </section>

    <div class="nav-footer">
        <div class="set-info">
            <span id="set-id" class="set-index">01</span>
            <span id="set-title" class="set-name">Loading...</span>
        </div>
        
        <div class="center-actions">
            <button class="arrow-btn" id="prev-btn" onclick="changeSet(-1)">Prev</button>
            <button class="arrow-btn" id="next-btn" onclick="changeSet(1)">Next</button>
        </div>

        <div>
            <button id="submit-btn" class="submit-btn" onclick="sendVotesToDiscord()">Submit Votes</button>
        </div>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="Expanded View"></div>

<script>
    const PROXY_SERVER_URL = "https://script.google.com/macros/s/AKfycbw7fJB0n9XNgMTlSLL1dbXmR8p7YufDjpJ6Ai7CNBR7ljObSwpFIBv3NlmXplSE0sgmZg/exec";

    let currentSetIndex = 0;
    const sets = document.querySelectorAll('.gallery-row');
    const setId = document.getElementById('set-id');
    const setTitle = document.getElementById('set-title');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const submitBtn = document.getElementById('submit-btn');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    let votes = {};
    sets.forEach(set => {
        votes[set.getAttribute('data-id')] = null;
    });

    function updateGallery() {
        sets.forEach(set => set.classList.remove('active'));
        sets[currentSetIndex].classList.add('active');
        
        const currentSetId = sets[currentSetIndex].getAttribute('data-id');
        setId.innerText = currentSetId + " / 03";
        setTitle.innerText = sets[currentSetIndex].getAttribute('data-name');
        
        prevBtn.disabled = currentSetIndex === 0;
        nextBtn.disabled = currentSetIndex === sets.length - 1;
        
        checkIfAllVoted();
    }

    function changeSet(direction) {
        currentSetIndex += direction;
        updateGallery();
    }

    function openLightbox(wrapperElement) {
        lightboxImg.src = wrapperElement.querySelector('img').src;
        lightbox.classList.add('active');
    }
    function closeLightbox() {
        lightbox.classList.remove('active');
    }

    function selectImage(itemId, setNumber, optionName) {
        const targetItem = document.getElementById(itemId);
        const currentGrid = targetItem.closest('.images-grid');
        
        currentGrid.querySelectorAll('.image-item').forEach(item => {
            item.classList.remove('selected');
            item.querySelector('.select-btn').innerText = "Select";
        });

        targetItem.classList.add('selected');
        targetItem.querySelector('.select-btn').innerText = "✓ Selected";

        votes[setNumber] = optionName;
        
        document.getElementById(`comment-box-${setNumber}`).classList.add('visible');
        
        checkIfAllVoted();
    }

    function checkIfAllVoted() {
        let allVoted = true;
        for (let key in votes) {
            if (votes[key] === null) allVoted = false;
        }
        submitBtn.style.display = allVoted ? "block" : "none";
    }

    function sendVotesToDiscord() {
        let discordContent = `📸 **NEW VEREDICT RECEIVED!**\n───────────────────\n`;
        
        for (let key in votes) {
            const textareaEl = document.getElementById(`critica-set${parseInt(key)}`);
            if (!textareaEl) continue;
            
            const critica = textareaEl.value.trim();
            if (!critica) {
                alert(`Please fill in the text boxes explaining the reason behind your choices.`);
                return;
            }
            discordContent += `🖼️ **SET ${key}:** ${votes[key]}\n💬 *Reason:* "${critica}"\n\n`;
        }
        discordContent += `───────────────────`;

        submitBtn.innerText = "SENDING...";
        submitBtn.disabled = true;

        const packagedPayload = {
            form_session_id: "table_meat_5637",
            content: discordContent
        };

        fetch(PROXY_SERVER_URL, {
            method: "POST",
            mode: "no-cors", 
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(packagedPayload)
        }).then(() => {
            submitBtn.innerText = "✓ SENT";
            submitBtn.style.background = "#27ae60";
            submitBtn.style.color = "#ffffff";
            
            document.querySelectorAll('.select-btn').forEach(btn => btn.disabled = true);
            document.querySelectorAll('textarea').forEach(el => el.disabled = true);
        }).catch(error => {
            submitBtn.innerText = "CONNECTION ERROR";
            submitBtn.style.background = "#c0392b";
            submitBtn.disabled = false;
        });
    }

    updateGallery();
</script>

</body>
</html>
